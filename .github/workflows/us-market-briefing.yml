name: US Market Kakao Briefing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "market_briefing_bot/**"
      - "tests/**"
      - ".github/workflows/us-market-briefing.yml"
  schedule:
    # 07:10 KST. This is after the regular US market close in both standard time and daylight saving time.
    - cron: "10 22 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_REDIRECT_URI: http://localhost:8765/callback
      KAKAO_LINK_URL: https://finance.yahoo.com/markets
      KAKAO_TOKENS_JSON: ${{ secrets.KAKAO_TOKENS_JSON }}
      KAKAO_SEND_MODE: link
      REPORT_PUBLIC_BASE_URL: https://magirl2.github.io/news-2/reports
      REPORT_TIMEZONE: Asia/Seoul
      MARKET_TIMEZONE: America/New_York
      WATCHLIST_SYMBOLS: ${{ secrets.WATCHLIST_SYMBOLS }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check readiness
        run: python -m market_briefing_bot readiness

      - name: Load previous signal history
        run: |
          mkdir -p reports
          curl -fsSL https://magirl2.github.io/news-2/reports/signals/latest.json -o reports/previous_signals.json || true

      - name: Build report
        run: python -m market_briefing_bot preview

      - name: Prepare Pages report
        run: |
          mkdir -p site/reports
          cp reports/*.html site/reports/ 2>/dev/null || true
          cp reports/*.md site/reports/ 2>/dev/null || true
          cp -r reports/signals site/reports/signals 2>/dev/null || true
          latest="$(ls site/reports/*_briefing.html 2>/dev/null | sort | tail -n 1)"
          if [ -n "$latest" ]; then
            latest_name="$(basename "$latest")"
            printf '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=reports/%s"><a href="reports/%s">latest report</a>\n' "$latest_name" "$latest_name" > site/index.html
          else
            printf '<!doctype html><meta charset="utf-8"><p>No report generated.</p>\n' > site/index.html
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Kakao briefing
        run: python -m market_briefing_bot send-built

      - name: Notify Kakao on failure
        if: failure()
        continue-on-error: true
        run: >
          python -m market_briefing_bot notify-failure
          --location "GitHub Actions: send-briefing"
          --error "미국장 브리핑 workflow 중 한 단계가 실패했습니다. 실패한 단계는 이 실행 로그에서 빨간 표시를 확인해 주세요."
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --rerun-hint "위 로그 링크를 열고 오른쪽 위 Re-run jobs를 누르세요."

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-briefing-reports
          path: |
            reports/*.md
            reports/*.html
            logs/*.log
          if-no-files-found: ignore
